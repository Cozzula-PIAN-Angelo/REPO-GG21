<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-libreria — Settimana VII Giorno I</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <header class="site-header">
      <h1>La mia libreria</h1>
      <p>Aggiungi i tuoi libri e segnali come letti.</p>
    </header>

    <main class="container">
      <form class="form-form">
        <h2 class="my-5">Aggiungi un libro</h2>
        <div class="form-floating mb-3">
          <h4>Titolo</h4>
          <input type="text" class="form-control" id="titoloInput" />
        </div>
        <div class="form-floating mb-3">
          <h4 for="autoreInput">Autore</h4>
          <input type="text" class="form-control" id="autoreInput" />
        </div>
        <div class="form-floating mb-3">
          <h4 for="annoInput">Anno</h4>
          <input type="text" class="form-control" id="annoInput" />
        </div>

        <div class="form-floating mb-3">
          <h4 for="categoria">Categoria</h4>
          <select type="text" class="form-control" id="Categoria">
            <option value="Cartaceo">Cartaceo</option>
            <option value="Digitale">Digitale</option>
            <option value="Kindle">Kindle</option>
          </select>
        </div>
        <button class="add">Aggiungi</button>
        <!-- form per aggiungere un libro: titolo, autore, anno, formato (cartaceo/digitale) -->
      </form>

      <section class="lista-section">
        <h2>I tuoi libri <span id="contatore-libri">0</span></h2>
        <ul id="lista-libri">
          <!-- popolato da JavaScript -->
        </ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
