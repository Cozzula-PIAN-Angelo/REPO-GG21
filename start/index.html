<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-libreria — Settimana VII Giorno I</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="header-row">
        <div>
          <h1>La mia libreria</h1>
          <p>Aggiungi i tuoi libri e segnali come letti.</p>
        </div>
        <div id="auth-box" class="auth-box"></div>
      </div>
    </header>

    <section id="profilo-section" class="profilo-section" hidden>
      <h2>Il tuo profilo</h2>
      <div id="profilo" class="profilo"></div>
    </section>

    <main class="container">
      <section class="cerca-section">
        <h2>Cerca un libro</h2>
        <div class="campo">
          <label for="cerca">Cerca nella libreria</label>
          <div class="cerca-row">
            <select id="filtro-cerca">
              <option value="q">Tutto</option>
              <option value="title">Titolo</option>
              <option value="author">Autore</option>
            </select>
            <input
              type="text"
              id="cerca"
              placeholder="es. harari, tolkien..."
            />
          </div>
        </div>
        <div id="spinner" class="spinner" hidden>Caricamento in corso...</div>
        <div id="errore" class="alert alert-danger" hidden></div>
      </section>
      <ul id="risultati" class="risultati"></ul>

      <section class="lista-section">
        <div class="lista-header">
          <h2>I tuoi libri <span id="contatore-libri">0</span></h2>
          <button id="svuota-tutto" class="btn-svuota">Svuota tutto</button>
        </div>
        <p class="info-storage">
          I libri sono salvati nel browser e sopravvivono al refresh.
        </p>

        <ul id="lista-libri">
          <!-- popolato da JavaScript -->
        </ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
